{% extends "base.html" %}
{% block title %}{{ guild.name }} — Tickets{% endblock %}
{% block content %}
<div class="page-header" data-guild-id="{{ guild.id }}">
    <div class="page-header-left">
        <h1>🎫 Ticket Management</h1>
        <p>{{ guild.name }}</p>
    </div>
    <a href="/dashboard/{{ guild.id }}" class="btn btn-outline">← Back</a>
</div>
<body data-guild-id="{{ guild.id }}">

<div class="section">
    <div class="section-header">
        <h2>Active & Recent Tickets</h2>
        <p>Last 50 tickets sorted by newest first</p>
    </div>
    <div id="tickets-table"><div class="empty-state"><p>Loading...</p></div></div>
</div>
{% endblock %}
