{% extends "base.html" %}
{% block title %}{{ guild.name }} — AutoMod{% endblock %}
{% block content %}
<body data-guild-id="{{ guild.id }}">
<div class="page-header">
    <div class="page-header-left">
        <h1>🛡️ AutoMod Settings</h1>
        <p>{{ guild.name }}</p>
    </div>
    <a href="/dashboard/{{ guild.id }}" class="btn btn-outline">← Back</a>
</div>
<div class="section">
    <div class="section-header">
        <h2>AutoMod Rules</h2>
        <p>Toggle automatic moderation rules. Changes take effect immediately.</p>
    </div>
    <form id="automod-form" data-config-form>
        <div class="form-group">
            <label class="form-check"><input type="checkbox" name="automod_enabled"><span>Enable AutoMod</span></label>
        </div>
        <div class="form-group">
            <label class="form-check"><input type="checkbox" name="automod_anti_spam"><span>Anti-Spam</span></label>
        </div>
        <div class="form-group">
            <label class="form-check"><input type="checkbox" name="automod_anti_invite"><span>Anti-Discord-Invite</span></label>
        </div>
        <div class="form-group">
            <label class="form-check"><input type="checkbox" name="automod_anti_links"><span>Anti-Links</span></label>
        </div>
        <div class="form-group">
            <label class="form-check"><input type="checkbox" name="automod_anti_mention_spam"><span>Anti-Mention Spam</span></label>
        </div>
        <div class="form-group">
            <label class="form-check"><input type="checkbox" name="automod_anti_caps"><span>Anti-Caps</span></label>
        </div>
        <div class="form-group">
            <label class="form-check"><input type="checkbox" name="automod_anti_scam"><span>Anti-Scam Detection</span></label>
        </div>
        <button type="button" class="btn btn-primary" data-save-config="automod-form">Save Settings</button>
    </form>
</div>
{% endblock %}
